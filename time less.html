<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIME LESS STORE PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eaeded;
}

/* HEADER */
header{
  background:#131921;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{
  color:#ff9900;
  font-size:20px;
}

/* LAYOUT */
.container{
  display:flex;
}

/* ADMIN */
.admin{
  width:280px;
  background:#232f3e;
  color:white;
  padding:10px;
  min-height:100vh;
  display:none;
}

.admin input{
  width:100%;
  padding:8px;
  margin:5px 0;
  border:none;
}

.admin button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  cursor:pointer;
}

.btn-add{background:#ff9900}
.btn-del{background:#ff4d4d;color:white}

/* SHOP */
.shop{
  flex:1;
  padding:15px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.price{
  color:#b12704;
  font-weight:bold;
}

.card button{
  width:100%;
  padding:8px;
  margin-top:5px;
  border:none;
  cursor:pointer;
}

.buy{background:#ffd814}
.admin-btn{background:#232f3e;color:white}

/* CART */
.cart{
  position:fixed;
  right:10px;
  top:70px;
  width:220px;
  background:white;
  padding:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.wave{
  background:#1aa7ec;
  color:white;
  width:100%;
  padding:8px;
  border:none;
  margin-top:10px;
  cursor:pointer;
}

small{color:gray}
</style>
</head>

<body>

<header>
  <h1>TIME LESS</h1>
  <div>
    🛒 <span id="count">0</span>
    <button onclick="openAdmin()" class="admin-btn">Admin</button>
  </div>
</header>

<div class="container">

<!-- ADMIN PANEL -->
<div class="admin" id="admin">
  <h3>👑 ADMIN PANEL</h3>

  <input id="pass" placeholder="Mot de passe admin">
  <button onclick="login()">Connexion</button>

  <hr>

  <input id="name" placeholder="Nom produit">
  <input id="price" placeholder="Prix">
  <input id="img" placeholder="Image URL">

  <button class="btn-add" onclick="saveProduct()">Ajouter / Modifier</button>
  <button class="btn-del" onclick="deleteProduct()">Supprimer</button>

  <small>Modifier = même nom produit</small>
</div>

<!-- SHOP -->
<div class="shop" id="shop"></div>

</div>

<!-- CART -->
<div class="cart">
  <h3>Panier</h3>
  <ul id="cart"></ul>

  <button class="wave" onclick="payWave()">Payer Wave</button>
  <button onclick="clearCart()">Vider</button>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = [];

if(products.length === 0){
  products = [
    {name:"Casque Gaming", price:15000, img:"https://via.placeholder.com/200"},
    {name:"Téléphone Pro", price:120000, img:"https://via.placeholder.com/200"}
  ];
}

function render(){
  let shop = document.getElementById("shop");
  shop.innerHTML = "";

  products.forEach((p,i)=>{
    shop.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <div class="price">${p.price} FCFA</div>
        <button class="buy" onclick="add(${i})">Ajouter</button>
      </div>
    `;
  });

  localStorage.setItem("products", JSON.stringify(products));
}

function add(i){
  cart.push(products[i]);
  document.getElementById("count").innerText = cart.length;
  renderCart();
}

function renderCart(){
  let list = document.getElementById("cart");
  list.innerHTML = "";

  cart.forEach(c=>{
    let li = document.createElement("li");
    li.textContent = `${c.name} - ${c.price}F`;
    list.appendChild(li);
  });
}

function clearCart(){
  cart = [];
  document.getElementById("count").innerText = 0;
  renderCart();
}

/* PAYMENT WAVE */
function payWave(){
  if(cart.length === 0){
    alert("Panier vide");
    return;
  }

  let total = cart.reduce((a,b)=>a+Number(b.price),0);

  let waveNumber = "225XXXXXXXX"; // 👉 TON NUMÉRO WAVE ICI

  let msg =
`Paiement Wave

Total: ${total} FCFA

Envoyer vers: ${waveNumber}

Après paiement, envoie capture au vendeur.`;

  alert(msg);

  window.open("https://wa.me/" + waveNumber, "_blank");

  cart = [];
  renderCart();
}

/* ADMIN */
function openAdmin(){
  document.getElementById("admin").style.display = "block";
}

function login(){
  let p = document.getElementById("pass").value;
  if(p === "admin123"){
    alert("Connexion réussie");
  } else {
    alert("Mot de passe incorrect");
  }
}

function saveProduct(){
  let n = document.getElementById("name").value;
  let p = document.getElementById("price").value;
  let i = document.getElementById("img").value;

  if(!n || !p) return;

  let index = products.findIndex(x=>x.name === n);

  if(index >= 0){
    products[index].price = p;
    products[index].img = i;
  } else {
    products.push({name:n, price:p, img:i});
  }

  render();
}

function deleteProduct(){
  let n = document.getElementById("name").value;
  products = products.filter(p=>p.name !== n);
  render();
}

render();

</script>

</body>
</html>
